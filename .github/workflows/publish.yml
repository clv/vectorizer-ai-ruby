name: Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: rubygems
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Verify tag version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(ruby -Ilib -rvectorizer_ai/version -e 'print VectorizerAI::VERSION')"
          if [ "$package_version" != "$tag_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $package_version"
            exit 1
          fi

      - name: Build gem
        run: bundle exec rake build

      - name: Publish to RubyGems
        uses: rubygems/release-gem@v1

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" pkg/*.gem --generate-notes
